apiVersion: apps/v1
kind: Deployment
metadata:
  name: graylog
  namespace: default
  labels:
    app: graylog
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graylog
  template:
    metadata:
      labels:
        app: graylog
        tier: infrastructure
    spec:
      containers:
      - name: graylog
        image: graylog/graylog:5.1
        ports:
        - containerPort: 9000
        - containerPort: 12201
          protocol: UDP
        env:
        - name: GRAYLOG_PASSWORD_SECRET
          value: "somepasswordsecret1234567890"
        - name: GRAYLOG_ROOT_PASSWORD_SHA2
          value: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"
        - name: GRAYLOG_HTTP_EXTERNAL_URI
          value: "http://127.0.0.1:9000/"
        - name: GRAYLOG_ELASTICSEARCH_HOSTS
          value: "http://elasticsearch-service:9200"
        - name: GRAYLOG_MONGODB_URI
          value: "mongodb://mongo-service:27017/graylog"
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: graylog-service
  namespace: default
  labels:
    app: graylog
spec:
  type: ClusterIP
  selector:
    app: graylog
  ports:
  - protocol: TCP
    port: 9000
    targetPort: 9000
    name: http
  - protocol: UDP
    port: 12201
    targetPort: 12201
    name: gelf
---
