apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: default
  labels:
    app: gateway-api
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway-api
        tier: gateway
    spec:
      containers:
      - name: gateway-api
        image: gateway-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: Vault__Address
          valueFrom:
            secretKeyRef:
              name: vault-credentials
              key: VAULT_ADDRESS
        - name: Vault__Token
          valueFrom:
            secretKeyRef:
              name: vault-credentials
              key: VAULT_TOKEN
        - name: Vault__MountPoint
          valueFrom:
            secretKeyRef:
              name: vault-credentials
              key: VAULT_MOUNT_POINT
        - name: Vault__SecretPath
          valueFrom:
            secretKeyRef:
              name: vault-credentials
              key: VAULT_SECRET_PATH
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "125m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: default
  labels:
    app: gateway-api
spec:
  type: ClusterIP
  selector:
    app: gateway-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    name: http
